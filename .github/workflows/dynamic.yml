name: Dynamic README

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/dynamic.yml"
      - "README.md"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Daily Quote
        shell: python
        run: |
          import urllib.request
          import json
          import re
          import random

          # List of fallback quotes if API fails
          fallbacks = [
              {"content": "Code is like humor. When you have to explain it, it’s bad.", "author": "Cory House"},
              {"content": "First, solve the problem. Then, write the code.", "author": "John Johnson"},
              {"content": "Experience is the name everyone gives to their mistakes.", "author": "Oscar Wilde"},
              {"content": "In order to be irreplaceable, one must always be different.", "author": "Coco Chanel"},
              {"content": "Knowledge is power.", "author": "Francis Bacon"}
          ]

          # Fetch a random quote
          try:
              # Using ZenQuotes API which is very reliable for motivational/dev quotes
              url = "https://zenquotes.io/api/random"
              with urllib.request.urlopen(url) as response:
                  data = json.loads(response.read().decode())
                  quote = data[0]['q']
                  author = data[0]['a']
          except Exception as e:
              print(f"Error fetching quote: {e}")
              f = random.choice(fallbacks)
              quote = f['content']
              author = f['author']

          # Create centered HTML quote
          quote_content = f"\n<p align=\"center\">\n  <i>\"{quote}\"</i><br>\n  <b>— {author}</b>\n</p>\n"

          # Read README.md
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          # Replace content between markers
          pattern = r"(<!--START_SECTION:quote-->)(.*?)(<!--END_SECTION:quote-->)"
          replacement = f"\\1{quote_content}\\3"
          new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          # Write back to README.md
          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update daily quote [skip ci]"
          git push
