name: Dynamic README

on:
  schedule:
    # Runs every 12 hours to keep the profile fresh while you sleep
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/dynamic.yml"
      - "README.md"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update GitHub Activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "chore: update github activity [skip ci]"

      - name: Daily Quotes
        uses: muesli/readme-quotes@master
        with:
          template: >
            ### 💬 Quote of the Day
            
            > {{ .Quote }}
            
            — {{ .Author }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
